job_id: ar-seg_visualize

data:
  valid_zarr_path: /anvil/scratch/x-jhong6/data/surya_bench_validation.zarr
  channels: ['aia94', 'aia131', 'aia171', 'aia193', 'aia211', 'aia304', 'aia335', 'aia1600', 'hmi_m', 'hmi_bx', 'hmi_by', 'hmi_bz', 'hmi_v']
  time_delta_input_minutes: [0]
  time_delta_target_minutes: +60
  batch_size: 1
  num_data_workers: 2
  prefetch_factor: 2
  scalers_path: ./assets/scalers.yaml
  ar_index_valid: ["./assets/ar_index_12min.csv"]
  ar_mask_base_dir: ./assets/surya-bench-ar-segmentation
  daily_only: true

model:
  model_type: spectformer_lora
  img_size: 4096
  patch_size: 16
  in_channels: 13
  time_embedding:
    type: linear
    n_queries: null
    time_dim: 1
  embed_dim: 1280
  depth: 10
  spectral_blocks: 2
  num_heads: 16
  mlp_ratio: 4.0
  rpe: false
  drop_rate: 0.0
  window_size: 2
  dp_rank: 4
  learned_flow: false
  epochs_to_learn_flow: 0
  init_weights: false
  checkpoint_layers: []
  ensemble: null
  unet_embed_dim: 128
  unet_blocks: 3
  finetune: True
  ft_unembedding_type: "linear"
  ft_out_chans: 1
  use_lora: true
  lora_config:
    r: 32
    lora_alpha: 64
    target_modules: ['q_proj', 'v_proj', 'k_proj', 'out_proj', 'fc1', 'fc2']
    lora_dropout: 0.1
    bias: 'none'
  select: "bce"
  dice:
    smooth: 1e-5
  iou:
    eps: 1e-6
  bce:
    pos_weight: 1

use_latitude_in_learned_flow: false
dtype: bfloat16

pretrained_path: ./assets/surya.366m.v1.pt